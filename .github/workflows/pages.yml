name: CI / Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build + test + metrics
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate companion site data
        run: npm run generate-site-data

      - name: Generate metrics report
        run: npm run metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate CycloneDX SBOM
        run: npm run sbom:cyclonedx

      - name: Generate SPDX SBOM
        run: npm run sbom:spdx

      - name: Upload metrics and coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: botmedic-metrics-${{ github.sha }}
          path: |
            metrics/current.json
            metrics/reports/
            metrics/raw/
            sbom.cyclonedx.json
            sbom.spdx.json
          retention-days: 30

      - name: Upload site assets
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: publish site
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
